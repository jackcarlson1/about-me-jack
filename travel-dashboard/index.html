<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }
    #chartWrap {
      position: relative;
      height: 360px;
    }
    #homeNote {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background-color: #eef2ff;
      border-left: 3px solid #1a56db;
      border-radius: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Places I've Visited</h1>

  <p>
    <label for="continentFilter">View: </label>
    <select id="continentFilter"></select>
  </p>

  <div id="chartWrap">
    <canvas id="visitsChart"></canvas>
  </div>

  <p id="homeNote">🤠 And of course — I live in Texas.</p>

  <script>
    // turn raw CSV text into an array of objects
    function parseCSV(text) {
      const rows = text.trim().split(/\r?\n/);
      const headers = rows[0].split(",");
      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const values = rows[i].split(",");
        const obj = {};
        for (let j = 0; j < headers.length; j++) {
          obj[headers[j]] = values[j];
        }
        out.push(obj);
      }
      return out;
    }

    async function loadData() {
      // load BOTH files at the same time
      const results = await Promise.all([
        fetch("data.csv").then(function (r) { return r.text(); }),
        fetch("states.csv").then(function (r) { return r.text(); })
      ]);
      const data = parseCSV(results[0]);    // countries
      const states = parseCSV(results[1]);  // US states
      console.log("countries:", data);
      console.log("states:", states);

      // dropdown: All + each continent + a special "United States" option
      const filterEl = document.querySelector("#continentFilter");
      const options = ["All"]
        .concat(Array.from(new Set(data.map(function (d) { return d.continent; }))))
        .concat(["United States"]);
      options.forEach(function (c) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        filterEl.appendChild(opt);
      });

      const chartWrap = document.querySelector("#chartWrap");
      const homeNote = document.querySelector("#homeNote");

      // create the chart once (starts on the countries view)
      const chart = new Chart(document.querySelector("#visitsChart"), {
        type: "bar",
        data: {
          labels: data.map(function (d) { return d.country; }),
          datasets: [{
            label: "Visits",
            data: data.map(function (d) { return Number(d.visits); }),
            backgroundColor: "#ff2e88"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true },
            y: { beginAtZero: true }
          }
        }
      });

      // update the chart with new labels / values / color / orientation
      function showView(labels, values, color, horizontal) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.data.datasets[0].backgroundColor = color;
        chart.options.indexAxis = horizontal ? "y" : "x";
        chart.update();
      }

      filterEl.addEventListener("change", function () {
        const choice = filterEl.value;

        if (choice === "United States") {
          // US view LOOKS DIFFERENT: blue, horizontal, ranked high-to-low
          const sorted = states.slice().sort(function (a, b) {
            return Number(b.visits) - Number(a.visits);
          });
          showView(
            sorted.map(function (s) { return s.state; }),
            sorted.map(function (s) { return Number(s.visits); }),
            "#1a56db",
            true
          );
          chartWrap.style.height = "760px";   // taller to fit 21 states
          homeNote.style.display = "block";
        } else {
          // country view: magenta, vertical
          const rows = (choice === "All")
            ? data
            : data.filter(function (d) { return d.continent === choice; });
          showView(
            rows.map(function (d) { return d.country; }),
            rows.map(function (d) { return Number(d.visits); }),
            "#ff2e88",
            false
          );
          chartWrap.style.height = "360px";
          homeNote.style.display = "none";
        }
      });
    }

    loadData();
  </script>
</body>
</html>
