<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Replay — Jack Carlson</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 32px 60px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    body.fade-out {
      opacity: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #backButton {
      padding: 8px 14px;
      font-size: 15px;
      border-radius: 10px;
      background-color: transparent;
      border: 1px solid #555555;
      color: #ffffff;
      cursor: pointer;
      transition: transform 0.08s ease;
    }
    #backButton:active {
      transform: scale(0.94);
    }
    .replay-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }
    #yearSelect {
      background-color: #1c1c1e;
      color: #ffffff;
      border: 1px solid #555555;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .months {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      margin: 18px 0 32px;
    }
    .month-tab {
      background: none;
      border: none;
      color: #777777;
      font-size: 17px;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease;
    }
    .month-tab.active {
      color: #ffffff;
      font-weight: 700;
    }

    .headline {
      font-size: 34px;
      font-weight: 700;
      color: #777777;
      margin: 0 0 44px;
      max-width: 700px;
      line-height: 1.2;
    }
    .headline strong {
      color: #ffffff;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .artists-row, .albums-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 44px;
    }
    .artist-card {
      flex: 0 0 180px;
      height: 220px;
      border-radius: 14px;
      background-color: #1c1c1e;
      background-size: cover;
      background-position: center;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .artist-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.75));
    }
    .artist-card > * {
      position: relative;
      z-index: 1;
    }
    .rank-num {
      font-size: 40px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    .artist-name {
      font-weight: 600;
      font-size: 15px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    .artist-min {
      font-size: 13px;
      color: #dddddd;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    .songs-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(5, auto);
      grid-auto-flow: column;
      gap: 16px 28px;
      margin-bottom: 44px;
    }
    .song-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .song-art {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex: 0 0 auto;
      background-color: #222222;
    }
    .song-rank {
      width: 22px;
      text-align: right;
      color: #aaaaaa;
      font-size: 14px;
      flex: 0 0 auto;
    }
    .song-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .song-title {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-sub {
      font-size: 13px;
      color: #aaaaaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-card {
      flex: 0 0 150px;
    }
    .album-art {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
      margin-bottom: 8px;
      background-color: #222222;
    }
    .album-name {
      font-weight: 600;
      font-size: 14px;
    }
    .album-sub {
      font-size: 13px;
      color: #aaaaaa;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .headline,
    .section-title,
    .artist-card,
    .song-row,
    .album-card {
      animation: fadeUp 0.5s ease both;
    }
    .artist-card,
    .song-row,
    .album-card {
      animation-delay: calc(var(--i, 0) * 45ms);
    }
    .services {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 4px 0 10px;
    }
    .services-label {
      color: #777777;
      font-size: 14px;
      margin-right: 4px;
    }
    .service-btn {
      background-color: #1c1c1e;
      color: #ffffff;
      border: 1px solid #3a3a3c;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.08s ease;
    }
    .service-btn:active {
      transform: scale(0.94);
    }
    .service-btn.active {
      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
    .artist-card,
    .song-row,
    .album-card {
      cursor: pointer;
    }
    .empty-state {
      color: #888888;
      font-size: 18px;
      margin: 40px 0;
    }
  </style>
</head>

    const months = ["January", "February", "March", "April", "May", "June"];
    const shortMonths = {
      January: "Jan", February: "Feb", March: "Mar",
      April: "Apr", May: "May", June: "Jun"
    };

    let currentYear = "2026";
    let currentMonth = "January";

    const monthsEl = document.querySelector("#months");
    const headlineEl = document.querySelector("#headline");
    const contentEl = document.querySelector("#content");
    const yearSelect = document.querySelector("#yearSelect");

    // Build the month tabs
    months.forEach(function (m) {
      const tab = document.createElement("button");
      tab.className = "month-tab";
      tab.textContent = shortMonths[m];
      tab.addEventListener("click", function () {
        currentMonth = m;
        render();
      });
      monthsEl.appendChild(tab);
    });

    yearSelect.addEventListener("change", function () {
      currentYear = yearSelect.value;
      render();
    });

    // --- Streaming service preference (remembered between visits) ---
    let currentService = "apple";
    try { currentService = localStorage.getItem("replayService") || "apple"; } catch (e) {}

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function buildServiceUrl(query) {
      var q = encodeURIComponent(query);
      if (currentService === "spotify") return "https://open.spotify.com/search/" + q;
      if (currentService === "youtube") return "https://music.youtube.com/search?q=" + q;
      if (currentService === "amazon")  return "https://music.amazon.com/search/" + q;
      return "https://music.apple.com/us/search?term=" + q;
    }

    const services = document.querySelector("#services");
    function updateServiceButtons() {
      document.querySelectorAll(".service-btn").forEach(function (b) {
        if (b.getAttribute("data-service") === currentService) b.classList.add("active");
        else b.classList.remove("active");
      });
    }
    services.addEventListener("click", function (e) {
      var b = e.target.closest(".service-btn");
      if (!b) return;
      currentService = b.getAttribute("data-service");
      try { localStorage.setItem("replayService", currentService); } catch (e2) {}
      updateServiceButtons();
    });
    updateServiceButtons();

    // Clicking any artist / song / album opens it in the chosen service
    contentEl.addEventListener("click", function (e) {
      var el = e.target.closest("[data-query]");
      if (!el) return;
      var apple = el.getAttribute("data-apple");
      if (currentService === "apple" && apple) {
        window.open(apple, "_blank");
      } else {
        window.open(buildServiceUrl(el.getAttribute("data-query")), "_blank");
      }
    });

    function render() {
      // Highlight the active month tab
      const tabs = document.querySelectorAll(".month-tab");
      tabs.forEach(function (tab, i) {
        if (months[i] === currentMonth) {
          tab.classList.add("active");
        } else {
          tab.classList.remove("active");
        }
      });

      const yearData = replayData[currentYear];
      const data = yearData ? yearData[currentMonth] : null;

      if (!data) {
        headlineEl.innerHTML = "";
        contentEl.innerHTML =
          '<p class="empty-state">No Replay data for ' + currentMonth + ' ' + currentYear + ' yet.</p>';
        return;
      }

      headlineEl.innerHTML =
        "Jack listened for <strong>" + data.minutes.toLocaleString() +
        " minutes</strong> in " + currentMonth + ".";

      let html = "";

      html += '<h2 class="section-title">Jack\'s Top Artists</h2>';
      html += '<div class="artists-row">';
      data.artists.forEach(function (a, i) {
        var artistBg = a.image ? '; background-image: url(\'' + a.image + '\')' : '';
        var artistApple = a.appleUrl ? ' data-apple="' + esc(a.appleUrl) + '"' : '';
        html +=
          '<div class="artist-card" data-query="' + esc(a.name) + '"' + artistApple + ' style="--i: ' + i + artistBg + '">' +
            '<div class="rank-num">' + (i + 1) + '</div>' +
            '<div>' +
              '<div class="artist-name">' + a.name + '</div>' +
              '<div class="artist-min">' + a.minutes + ' minutes</div>' +
            '</div>' +
          '</div>';
      });
      html += '</div>';

      html += '<h2 class="section-title">Jack\'s Top Songs</h2>';
      html += '<div class="songs-grid">';
      data.songs.forEach(function (s, i) {
        var songThumb = s.art
          ? '<img class="song-art" src="' + s.art + '" alt="' + s.song + '">'
          : '<div class="song-art"></div>';
        var songApple = s.appleUrl ? ' data-apple="' + esc(s.appleUrl) + '"' : '';
        html +=
          '<div class="song-row" data-query="' + esc(s.song + " " + s.artist) + '"' + songApple + ' style="--i: ' + i + '">' +
            '<div class="song-rank">' + (i + 1) + '</div>' +
            songThumb +
            '<div class="song-info">' +
              '<div class="song-title">' + s.song + '</div>' +
              '<div class="song-sub">' + s.artist + ' · ' + s.plays + ' Plays</div>' +
            '</div>' +
          '</div>';
      });
      html += '</div>';

      html += '<h2 class="section-title">Jack\'s Top Albums</h2>';
      html += '<div class="albums-row">';
      data.albums.forEach(function (al, i) {
        var albumCover = al.art
          ? '<img class="album-art" src="' + al.art + '" alt="' + al.album + '">'
          : '<div class="album-art"></div>';
        var albumApple = al.appleUrl ? ' data-apple="' + esc(al.appleUrl) + '"' : '';
        html +=
          '<div class="album-card" data-query="' + esc(al.album + " " + al.artist) + '"' + albumApple + ' style="--i: ' + i + '">' +
            albumCover +
            '<div class="album-name">' + al.album + '</div>' +
            '<div class="album-sub">' + al.artist + ' · ' + al.minutes + ' minutes</div>' +
          '</div>';
      });
      html += '</div>';

      contentEl.innerHTML = html;
    }

    const backButton = document.querySelector("#backButton");
    backButton.addEventListener("click", function () {
      document.body.classList.add("fade-out");
      setTimeout(function () {
        window.location.href = "index.html";
      }, 350);
    });

    render();
  </script>
</body>
</html>
