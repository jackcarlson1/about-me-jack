<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBI Most Wanted — Jack Carlson</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 32px 60px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    body.fade-out { opacity: 0; }
    #backButton {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 12px;
      background-color: transparent;
      border: 1px solid #555555;
      color: #ffffff;
      cursor: pointer;
      z-index: 1000;
      transition: transform 0.08s ease;
    }
    #backButton:active { transform: scale(0.94); }
    h1 {
      text-align: center;
      margin: 60px 0 6px;
    }
    .subtitle {
      text-align: center;
      color: #888888;
      margin: 0 0 32px;
    }
    #wanted {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .cat-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .cat-btn {
      background-color: #1c1c1e;
      color: #ffffff;
      border: 1px solid #3a3a3c;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.08s ease;
    }
    .cat-btn:active { transform: scale(0.94); }
    .cat-btn.active {
      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .wanted-card {
      animation: fadeUp 0.4s ease both;
      animation-delay: calc(var(--i, 0) * 40ms);
      cursor: pointer;
    }
    .wanted-photo {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      background-color: #222222;
      display: block;
    }
    .wanted-name {
      font-weight: 700;
      font-size: 14px;
      margin-top: 8px;
    }
    .wanted-crime {
      font-size: 13px;
      color: #aaaaaa;
      margin-top: 2px;
    }
    .wanted-reward {
      font-size: 12px;
      color: #f5c518;
      margin-top: 4px;
    }
    .status {
      text-align: center;
      color: #888888;
      font-size: 18px;
      margin: 40px 0;
    }
  </style>
</head>
<body>
  <button id="backButton">&larr; Back</button>
  <h1>FBI Most Wanted</h1>
  <p class="subtitle">Live data from the FBI Wanted API</p>
  <div class="cat-bar" id="catBar"></div>
  <div id="wanted"><p class="status">Loading&hellip;</p></div>

  <script>
    const wanted = document.querySelector("#wanted");
    const catBar = document.querySelector("#catBar");

    const categories = [
      { label: "All", value: "" },
      { label: "Ten Most Wanted", value: "ten" },
      { label: "Terrorists", value: "terrorist" },
      { label: "Missing Persons", value: "missing" },
      { label: "Kidnappings", value: "kidnapping" },
      { label: "Crimes Against Children", value: "ecap" },
      { label: "Seeking Info", value: "information" },
      { label: "Law Enforcement", value: "law" },
      { label: "Fraudsters", value: "fraudster" },
      { label: "Violent Crime", value: "violent" }
    ];
    let currentCategory = "";

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // Build the category filter buttons
    categories.forEach(function (cat) {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.textContent = cat.label;
      btn.setAttribute("data-value", cat.value);
      btn.addEventListener("click", function () {
        currentCategory = cat.value;
        updateCatButtons();
        loadWanted();
      });
      catBar.appendChild(btn);
    });
    function updateCatButtons() {
      document.querySelectorAll(".cat-btn").forEach(function (b) {
        if (b.getAttribute("data-value") === currentCategory) b.classList.add("active");
        else b.classList.remove("active");
      });
    }
    updateCatButtons();

    function photoOf(p) {
      if (p.images && p.images[0]) {
        return p.images[0].large || p.images[0].thumb || p.images[0].original || null;
      }
      return null;
    }

    function renderPeople(items, note) {
      // Only show people who have BOTH a photo and a working page link.
      var people = (items || []).filter(function (p) {
        return photoOf(p) && p.url;
      });
      if (people.length === 0) {
        wanted.innerHTML = '<p class="status">No results in this category.</p>';
        return;
      }
      let html = "";
      if (note) {
        html += '<p class="status" style="grid-column: 1 / -1; margin: 0;">' + esc(note) + '</p>';
      }
      people.forEach(function (person, i) {
        const photo = photoOf(person);
        const crime = person.description || (person.subjects && person.subjects[0]) || "";
        const reward = person.reward_text || "";
        html +=
          '<div class="wanted-card" data-url="' + esc(person.url) + '" style="--i: ' + i + '">' +
            '<img class="wanted-photo" src="' + esc(photo) + '" alt="">' +
            '<div class="wanted-name">' + esc(person.title) + '</div>' +
            (crime ? '<div class="wanted-crime">' + esc(crime) + '</div>' : '') +
            (reward ? '<div class="wanted-reward">' + esc(reward) + '</div>' : '') +
          '</div>';
      });
      wanted.innerHTML = html;
    }

    async function loadWanted() {
      wanted.innerHTML = '<p class="status">Loading&hellip;</p>';
      try {
        if (currentCategory === "violent") {
          // The API has no "violent" filter, so scan several pages and filter here.
          const pages = [1, 2, 3, 4, 5, 6];
          const results = await Promise.all(pages.map(function (p) {
            return fetch("https://api.fbi.gov/wanted/v1/list?pageSize=50&page=" + p)
              .then(function (r) { return r.json(); });
          }));
          let items = [];
          results.forEach(function (d) { if (d.items) items = items.concat(d.items); });
          const violent = items.filter(function (p) {
            return (p.subjects || []).some(function (s) {
              return s.toLowerCase().indexOf("violent") !== -1;
            });
          });
          renderPeople(violent, "Best-effort filter — violent-crime entries found in the first " + items.length + " records scanned (not the full database).");
          return;
        }

        var url = "https://api.fbi.gov/wanted/v1/list?page=1";
        if (currentCategory) url += "&poster_classification=" + encodeURIComponent(currentCategory);
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Server returned status " + response.status);
        }
        const data = await response.json();
        renderPeople(data.items, "");
      } catch (error) {
        wanted.innerHTML =
          '<p class="status">⚠️ Sorry, the FBI Most Wanted list couldn\'t load right now. ' +
          'Please check your connection and try again.<br>' +
          '<small>(' + esc(error.message) + ')</small></p>';
      }
    }

    const backButton = document.querySelector("#backButton");
    backButton.addEventListener("click", function () {
      document.body.classList.add("fade-out");
      setTimeout(function () {
        window.location.href = "index.html";
      }, 350);
    });

    // Click any card -> open that person's FBI page in a new tab
    wanted.addEventListener("click", function (e) {
      var card = e.target.closest("[data-url]");
      if (!card) return;
      window.open(card.getAttribute("data-url"), "_blank");
    });

    loadWanted();
  </script>
</body>
</html>
