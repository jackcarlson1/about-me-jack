<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack Carlson — About Me</title>
<meta name="description" content="The personal About Me page of Jack Carlson">
<style>
  body, button {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  h1 {
    font-weight: 700;
  }
  a, button {
    margin-bottom: 8px;
  }
  button {
    transition: transform 0.08s ease;
  }
  button:active {
    transform: scale(0.94);
  }
  img {
    border-radius: 20px;
  }
  #countButton {
    padding: 20px 40px;
    font-size: 20px;
    border-radius: 12px;
    background-color: white;
    border: 1px solid #cccccc;
  }
  #williamButton {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1000;
  }
  #williamOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: black;
    z-index: 900;
  }
  #williamOverlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 0;
  }
  #gizmoButton {
    position: fixed;
    top: 56px;
    right: 16px;
    z-index: 1000;
  }
  #gizmoOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: black;
    z-index: 900;
  }
  #gizmoOverlay img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 0;
  }
  #factDisplay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 80%;
    padding: 24px 32px;
    font-size: 22px;
    color: black;
    background-color: white;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 1500;
  }
  #factDisplay.show {
    opacity: 1;
  }
  @keyframes fall {
    to {
      transform: translateY(110vh);
    }
  }
  .raindrop {
    position: fixed;
    top: -60px;
    font-weight: bold;
    color: magenta;
    z-index: 2000;
    pointer-events: none;
    animation: fall linear forwards;
  }
  #sidebar {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 800;
  }
  #sidebarToggle {
    margin-bottom: 0;
  }
  #sidebarContent {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 16px;
    padding: 28px;
    background-color: #f0f0f0;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    transform: scale(1);
    transform-origin: top left;
    opacity: 1;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #sidebarContent button {
    padding: 14px 28px;
    font-size: 16px;
    white-space: nowrap;
    border-radius: 12px;
    background-color: transparent;
    border: 1px solid #cccccc;
  }
  #sidebar.collapsed #sidebarContent {
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<button id="williamButton">william</button>
<div id="williamOverlay">
  <img src="william.jpeg" alt="William">
</div>
<button id="gizmoButton">gizmo</button>
<div id="gizmoOverlay">
  <img src="gizmo.jpeg" alt="Gizmo">
</div>

<div id="sidebar" class="collapsed">
  <button id="sidebarToggle">▼</button>
  <div id="sidebarContent">
    <button id="colorButton">🎨 Change color</button>
    <button id="chartButton">🎵 Music replay</button>
    <button id="wantedButton">🚨 Most Wanted</button>
  </div>
</div>

<h1 style="color: magenta;">Jack Carlson</h1>
<img src="profile.png" alt="Photo of me" style="width: 500px;">
<a href="https://allenacademy.org" target="_blank" rel="noopener">My school</a>
<a href="https://nauticalarch.org" target="_blank" rel="noopener">INA</a>

<button id="factButton">Tell me a fact</button>
<p id="factDisplay"></p>

<button id="countButton">Clicked 0 times</button>

<script>
  console.log("Hello from Javascript!");

  const button = document.querySelector("#colorButton");
  const heading = document.querySelector("h1");

  let currentColor = "magenta";

  button.addEventListener("click", function (e) {
    if (currentColor === "magenta") {
      // magenta -> rainbow
      heading.style.width = "fit-content";
      heading.style.backgroundImage =
        "linear-gradient(to right, red, orange, gold, green, blue, purple)";
      heading.style.webkitBackgroundClip = "text";
      heading.style.backgroundClip = "text";
      heading.style.color = "transparent";
      currentColor = "rainbow";
    } else if (currentColor === "rainbow") {
      // rainbow -> red
      heading.style.width = "auto";
      heading.style.backgroundImage = "none";
      heading.style.webkitBackgroundClip = "border-box";
      heading.style.color = "red";
      currentColor = "red";
    } else if (currentColor === "red") {
      // red -> blue
      heading.style.width = "auto";
      heading.style.backgroundImage = "none";
      heading.style.webkitBackgroundClip = "border-box";
      heading.style.color = "blue";
      currentColor = "blue";
    } else if (currentColor === "blue") {
      // blue -> orange
      heading.style.width = "auto";
      heading.style.backgroundImage = "none";
      heading.style.webkitBackgroundClip = "border-box";
      heading.style.color = "orange";
      currentColor = "orange";
    } else if (currentColor === "orange") {
      // orange -> black
      heading.style.width = "auto";
      heading.style.backgroundImage = "none";
      heading.style.webkitBackgroundClip = "border-box";
      heading.style.color = "black";
      currentColor = "black";
    } else {
      // black -> magenta
      heading.style.width = "auto";
      heading.style.backgroundImage = "none";
      heading.style.webkitBackgroundClip = "border-box";
      heading.style.color = "magenta";
      currentColor = "magenta";
    }
  });

  const facts = [
    "I go to Turkey every summer",
    "I graduate highschool in 2028",
    "My favorite movie is Cars 2",
    "I play football and do track",
    "My birthday is January 18"
  ];

  const factButton = document.querySelector("#factButton");
  const factDisplay = document.querySelector("#factDisplay");

  let remainingFacts = [];
  let lastFact = null;
  let factTimeout;

  factButton.addEventListener("click", function () {
    if (remainingFacts.length === 0) {
      remainingFacts = facts.slice();
    }
    let randomIndex = Math.floor(Math.random() * remainingFacts.length);
    if (remainingFacts[randomIndex] === lastFact && remainingFacts.length > 1) {
      randomIndex = (randomIndex + 1) % remainingFacts.length;
    }
    const randomFact = remainingFacts[randomIndex];
    remainingFacts.splice(randomIndex, 1);
    lastFact = randomFact;

    factDisplay.textContent = randomFact;
    factDisplay.classList.add("show");

    clearTimeout(factTimeout);
    factTimeout = setTimeout(function () {
      factDisplay.classList.remove("show");
    }, 3000);
  });

  const countButton = document.querySelector("#countButton");
  let count = 0;

  countButton.addEventListener("click", function () {
    count = count + 1;
    countButton.textContent = "Clicked " + count + " times";
    if (count === 67) {
      rain67();
    }
  });

  function rain67() {
    for (let i = 0; i < 60; i++) {
      const drop = document.createElement("div");
      drop.textContent = "67";
      drop.className = "raindrop";
      drop.style.left = (Math.random() * 100) + "vw";
      drop.style.fontSize = (Math.random() * 30 + 20) + "px";
      drop.style.animationDuration = (Math.random() * 2 + 2) + "s";
      drop.style.animationDelay = (Math.random() * 1.5) + "s";
      document.body.appendChild(drop);
      setTimeout(function () {
        drop.remove();
      }, 6000);
    }
  }

  const williamButton = document.querySelector("#williamButton");
  const williamOverlay = document.querySelector("#williamOverlay");

  williamButton.addEventListener("click", function () {
    if (williamOverlay.style.display === "block") {
      williamOverlay.style.display = "none";
      williamButton.textContent = "william";
    } else {
      williamOverlay.style.display = "block";
      williamButton.textContent = "no william";
    }
  });

  const gizmoButton = document.querySelector("#gizmoButton");
  const gizmoOverlay = document.querySelector("#gizmoOverlay");

  gizmoButton.addEventListener("click", function () {
    if (gizmoOverlay.style.display === "block") {
      gizmoOverlay.style.display = "none";
      gizmoButton.textContent = "gizmo";
    } else {
      gizmoOverlay.style.display = "block";
      gizmoButton.textContent = "no gizmo";
    }
  });

  const chartButton = document.querySelector("#chartButton");

  chartButton.addEventListener("click", function () {
    window.location.href = "charts.html";
  });

  const sidebar = document.querySelector("#sidebar");
  const sidebarToggle = document.querySelector("#sidebarToggle");

  sidebarToggle.addEventListener("click", function () {
    sidebar.classList.toggle("collapsed");
    if (sidebar.classList.contains("collapsed")) {
      sidebarToggle.textContent = "▼";
    } else {
      sidebarToggle.textContent = "▲ collapse menu";
    }
  });

  const wantedButton = document.querySelector("#wantedButton");
  wantedButton.addEventListener("click", function () {
    window.location.href = "wanted.html";
  });
</script>
</body>
</html>
